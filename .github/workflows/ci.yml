name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      - run: npm run build

  wasm-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Build WASM decoders
        run: |
          bash wasm/build-ec3.sh
          bash wasm/build-jm264.sh
          bash wasm/build-hm265.sh
          bash wasm/build-dav1d-av1.sh

      - name: Verify WASM binaries
        run: |
          for f in public/ec3-decoder.wasm public/jm264-qp.wasm public/hm265-qp.wasm public/dav1d-qp.wasm; do
            ls -la "$f"
            SIZE=$(stat --printf="%s" "$f")
            echo "$f: ${SIZE} bytes"
            if [ "$SIZE" -lt 100000 ]; then
              echo "ERROR: $f too small (${SIZE} bytes)"
              exit 1
            fi
          done

      - name: Install FFmpeg for WASM tests
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run WASM QP decoder tests
        run: |
          node wasm/test-validate-qp.mjs
          node wasm/test-validate-qp-h265.mjs
          node wasm/test-validate-qp-av1.mjs

      - name: Upload WASM binaries
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: public/*.wasm
          retention-days: 1

  generate-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute fixture hash
        id: hash
        run: echo "value=$(bash e2e/fixture-hash.sh)" >> "$GITHUB_OUTPUT"

      - name: Check fixture cache
        id: cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if bash e2e/download-fixtures.sh "${{ runner.temp }}/dash-fixture"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ffmpeg and fonts
        if: steps.cache.outputs.hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Shaka Packager
        if: steps.cache.outputs.hit != 'true'
        run: |
          VERSION="v3.2.0"
          BIN="packager-linux-x64"
          URL="https://github.com/shaka-project/shaka-packager/releases/download/$VERSION/$BIN"
          curl -fsSL "$URL" -o packager && chmod +x packager
          sudo mv packager /usr/local/bin/

      - name: Generate DASH fixtures
        if: steps.cache.outputs.hit != 'true'
        run: bash e2e/generate-dash-fixture.sh "${{ runner.temp }}/dash-fixture"

      - name: Upload fixtures to GitHub Release
        if: steps.cache.outputs.hit != 'true' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash e2e/upload-fixtures.sh "${{ runner.temp }}/dash-fixture"

      - name: Upload fixtures as artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-fixtures
          path: ${{ runner.temp }}/dash-fixture
          retention-days: 1

  e2e:
    needs: [generate-fixtures]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    continue-on-error: ${{ matrix.os == 'ubuntu-latest' && matrix.browser == 'webkit' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        browser: [chromium, firefox, webkit]
        include:
          - os: macos-latest
            browser: webkit
          - os: macos-latest
            browser: firefox
          - os: windows-latest
            browser: edge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download E2E fixtures
        uses: actions/download-artifact@v4
        with:
          name: e2e-fixtures
          path: ${{ runner.temp }}/dash-fixture

      - name: Install Playwright browser (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright browser (macOS)
        if: matrix.os == 'macos-latest'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright browser (Windows)
        if: runner.os == 'Windows'
        run: npx playwright install --with-deps chromium

      - name: Install H.264 codecs for Firefox
        if: matrix.browser == 'firefox' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gstreamer1.0-libav

      - name: Install HEVC Video Extensions (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: powershell
        run: |
          $url = "https://github.com/OpenIPC/rnd-player/releases/download/ci-assets/Microsoft.HEVCVideoExtension_2.4.43.0_neutral_._8wekyb3d8bbwe.AppxBundle"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\hevc.appxbundle" -UseBasicParsing
          Add-AppxPackage -Path "$env:TEMP\hevc.appxbundle" `
            -DependencyPath "https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx"
          $pkg = Get-AppxPackage -Name "Microsoft.HEVCVideoExtension*" -ErrorAction SilentlyContinue
          if ($pkg) { Write-Host "HEVC installed: $($pkg.Version)" }
          else { Write-Host "HEVC not found after install" }

      - name: Run Playwright tests
        shell: bash
        run: |
          npx playwright test --project=${{ matrix.browser }} --global-timeout=600000 || \
          npx playwright test --project=${{ matrix.browser }} --global-timeout=600000
        env:
          DASH_FIXTURE_DIR: ${{ runner.temp }}/dash-fixture

      - name: Check for fully-skipped test suites
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'test-results/report.json';
            if (!fs.existsSync(path)) { console.log('No JSON report found, skipping check'); process.exit(0); }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            function check(suite, parent) {
              const name = parent ? parent + ' > ' + suite.title : suite.title;
              const specs = suite.specs || [];
              if (specs.length > 0) {
                const allSkipped = specs.every(s => s.tests.every(t => t.results.every(r => r.status === 'skipped')));
                if (allSkipped) console.log('::warning::All tests skipped in suite: ' + name);
              }
              for (const child of suite.suites || []) check(child, name);
            }
            for (const s of report.suites || []) check(s, '');
          "

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.os }}-${{ matrix.browser }}
          path: blob-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: screenshot-${{ matrix.os }}-${{ matrix.browser }}
          path: e2e/screenshots/
          retention-days: 90

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, e2e, wasm-build, generate-fixtures]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download WASM binaries
        uses: actions/download-artifact@v4
        with:
          name: wasm-binaries
          path: public/

      - name: Read version from package.json
        id: version
        run: echo "value=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build versioned
        run: npm run build
        env:
          VITE_BASE_PATH: /rnd-player/${{ steps.version.outputs.value }}/
          VITE_CORS_PROXY_URL: ${{ secrets.VITE_CORS_PROXY_URL }}
          VITE_CORS_PROXY_HMAC_KEY: ${{ secrets.VITE_CORS_PROXY_HMAC_KEY }}

      - run: mkdir -p site/${{ steps.version.outputs.value }}
      - run: cp -r dist/* site/${{ steps.version.outputs.value }}/

      - name: Build current
        run: npm run build
        env:
          VITE_BASE_PATH: /rnd-player/current/
          VITE_CORS_PROXY_URL: ${{ secrets.VITE_CORS_PROXY_URL }}
          VITE_CORS_PROXY_HMAC_KEY: ${{ secrets.VITE_CORS_PROXY_HMAC_KEY }}

      - run: mkdir -p site/current
      - run: cp -r dist/* site/current/

      - name: Restore previous versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/artifacts?name=site-archive --jq '.artifacts[0].id // empty')
          if [ -n "$ARTIFACT_ID" ]; then
            gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > archive.zip
            unzip -o archive.zip -d old-site
            for dir in old-site/v*/; do
              dir_name=$(basename "$dir")
              if [ ! -d "site/$dir_name" ]; then
                cp -r "$dir" "site/$dir_name"
              fi
            done
          fi

      - name: Generate root redirect
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=current/"></head>
          <body><a href="current/">Redirect</a></body>
          </html>
          EOF

      - name: Generate versions.json
        run: |
          node -e "
            const fs = require('fs');
            const dirs = fs.readdirSync('site')
              .filter(d => d.startsWith('v') && fs.statSync('site/' + d).isDirectory())
              .sort();
            fs.writeFileSync('site/versions.json', JSON.stringify(dirs, null, 2) + '\n');
          "

      - name: Download E2E fixtures for Pages
        uses: actions/download-artifact@v4
        with:
          name: e2e-fixtures
          path: site/fixtures/frames

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshot-*
          path: site/screenshots/
          merge-multiple: true

      - name: Upload site archive (versioned builds only)
        uses: actions/upload-artifact@v4
        with:
          name: site-archive
          path: site/v*/
          retention-days: 90

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
